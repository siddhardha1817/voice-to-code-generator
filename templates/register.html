<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Voice2Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0f172a] bg-gradient-to-br from-[#0f172a] via-[#1e1b4b] to-[#020617] min-h-screen flex items-center justify-center p-4 antialiased">
    
    <div class="w-full max-w-md bg-[#1e293b]/90 backdrop-blur-2xl border border-gray-700/50 rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.6)] p-8 sm:p-10 relative overflow-hidden group">
        <!-- Futuristic Glow Effects -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-purple-600 rounded-full mix-blend-multiply filter blur-[3xl] opacity-20 group-hover:opacity-30 transition-opacity duration-700"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-[#3b82f6] rounded-full mix-blend-multiply filter blur-[3xl] opacity-20 group-hover:opacity-30 transition-opacity duration-700"></div>

        <div class="relative z-10">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-purple-600 to-[#3b82f6] shadow-[0_0_20px_rgba(168,85,247,0.4)] mb-5 transform -rotate-3">
                    <i class="fa-solid fa-user-plus text-2xl text-white transform rotate-3"></i>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-wide">Create Account</h1>
                <p class="text-gray-400 mt-2 text-sm font-medium">Join Voice2Code today</p>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="mb-6 space-y-3">
                {% for message in messages %}
                  {% set is_success = 'success' in message|lower %}
                  <div class="{% if is_success %}bg-green-500/10 border-green-500/40 text-green-400{% else %}bg-red-500/10 border-red-500/40 text-red-400{% endif %} border px-4 py-3 rounded-xl text-sm text-center font-medium shadow-sm backdrop-blur-sm">
                      <i class="fa-solid {% if is_success %}fa-circle-check{% else %}fa-circle-exclamation{% endif %} mr-2"></i>{{ message }}
                  </div>
                {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form method="POST" action="/register" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-semibold text-gray-300 mb-1.5 ml-1">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-user text-gray-500"></i>
                        </div>
                        <input type="text" id="username" name="username" required 
                            class="w-full bg-[#0f172a]/80 text-white border border-gray-600/50 rounded-xl py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-[#3b82f6]/60 focus:border-[#3b82f6]/60 transition-all shadow-inner placeholder-gray-500 text-sm" 
                            placeholder="Choose a username">
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-sm font-semibold text-gray-300 mb-1.5 ml-1">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-envelope text-gray-500"></i>
                        </div>
                        <input type="email" id="email" name="email" required 
                            class="w-full bg-[#0f172a]/80 text-white border border-gray-600/50 rounded-xl py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-[#3b82f6]/60 focus:border-[#3b82f6]/60 transition-all shadow-inner placeholder-gray-500 text-sm" 
                            placeholder="Enter your email">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-300 mb-1.5 ml-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-gray-500"></i>
                        </div>
                        <input type="password" id="password" name="password" required 
                            class="w-full bg-[#0f172a]/80 text-white border border-gray-600/50 rounded-xl py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-[#3b82f6]/60 focus:border-[#3b82f6]/60 transition-all shadow-inner placeholder-gray-500 text-sm" 
                            placeholder="Create a password">
                    </div>
                </div>

                <div class="pt-3">
                    <button type="submit" class="w-full py-3.5 px-4 bg-gradient-to-r from-purple-600 to-[#3b82f6] hover:from-purple-500 hover:to-blue-500 text-white rounded-xl transition-all duration-300 transform hover:scale-[1.02] hover:shadow-[0_0_20px_rgba(168,85,247,0.5)] font-bold tracking-wide flex items-center justify-center">
                        Register <i class="fa-solid fa-user-plus ml-2 text-sm opacity-80"></i>
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center border-t border-gray-700/50 pt-6">
                <p class="text-sm text-gray-400 font-medium">
                    Already have an account? 
                    <a href="/login" class="text-[#3b82f6] hover:text-blue-400 font-bold hover:underline transition-all">Login here</a>
                </p>
                <p class="mt-5">
                    <a href="/" class="text-xs text-gray-500 hover:text-gray-300 font-medium transition-all group-hover:text-gray-400">
                        <i class="fa-solid fa-arrow-left mr-1.5 transition-transform group-hover:-translate-x-1"></i> Back to Home
                    </a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
